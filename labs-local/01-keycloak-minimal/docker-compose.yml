services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: kc-lab-minimal
    command:
      - start-dev
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: adminadmin
    ports:
      - "18080:8080"
    restart: unless-stopped
