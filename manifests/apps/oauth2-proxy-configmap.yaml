apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-config
  namespace: keycloak
  labels:
    app: oauth2-proxy
data:
  oauth2-proxy.cfg: |
    provider = "keycloak-oidc"
    oidc_issuer_url = "https://keycloak.example.com/realms/demo"
    client_id = "legacy-proxy"
    redirect_url = "https://proxy.example.com/oauth2/callback"
    email_domains = ["*"]
    reverse_proxy = true
    set_xauthrequest = true
    set_authorization_header = true
    pass_access_token = true
    upstreams = ["http://whoami.default.svc.cluster.local:80/"]
