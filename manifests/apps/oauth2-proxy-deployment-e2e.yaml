apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-e2e
  template:
    metadata:
      labels:
        app: oauth2-proxy-e2e
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
          args:
            - --provider=keycloak-oidc
            - --http-address=0.0.0.0:4180
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --set-authorization-header=true
          ports:
            - containerPort: 4180
